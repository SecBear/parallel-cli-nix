name: Test PR

on:
  pull_request:
    paths:
      - "package.nix"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/**"

jobs:
  test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            allowUnfree = true
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Build parallel-cli
        run: NIXPKGS_ALLOW_UNFREE=1 nix build .#parallel-cli --print-build-logs --impure

      - name: Test version output
        run: |
          ./result/bin/parallel-cli --version
          ./result/bin/parallel-cli --version 2>&1 | grep -E "parallel-cli"

      - name: Verify package contents
        run: |
          test -f ./result/bin/parallel-cli
          test -f ./result/lib/parallel-cli/parallel-cli
          test -d ./result/lib/parallel-cli/_internal

      - name: Test help
        run: ./result/bin/parallel-cli --help
